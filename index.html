<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <title>NCE 1 Community Cat Registry</title>
    <style>
        body {
            background-color: #FDFBF7;
            font-family: 'JetBrains Mono', monospace;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-in;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const API_URL = 'https://script.google.com/macros/s/AKfycbw1q-xlR7Tt3I_v4NReh5prHyO1j_k2Qhw1jK3kkXGpPX7M2tfRuqxK0nzSw5q7UKXu/exec';

        const getImageUrl = (url) => {
            if (!url || url.toString().trim() === "") {
                return "https://placehold.co/600x400?text=No+Photo+Yet";
            }
            return url;
        };

        // Simple Pie Chart Component
        const PieChart = ({ data }) => {
            let currentAngle = 0;
            const paths = data.map((item, index) => {
                const sliceAngle = (item.value / data.reduce((sum, d) => sum + d.value, 0)) * 360;
                const x1 = 50 + 40 * Math.cos((currentAngle * Math.PI) / 180);
                const y1 = 50 + 40 * Math.sin((currentAngle * Math.PI) / 180);
                const x2 = 50 + 40 * Math.cos(((currentAngle + sliceAngle) * Math.PI) / 180);
                const y2 = 50 + 40 * Math.sin(((currentAngle + sliceAngle) * Math.PI) / 180);
                const largeArc = sliceAngle > 180 ? 1 : 0;
                const pathD = `M 50 50 L ${x1} ${y1} A 40 40 0 ${largeArc} 1 ${x2} ${y2} Z`;
                currentAngle += sliceAngle;
                return <path key={index} d={pathD} fill={item.fill} />;
            });
            return (
                <svg viewBox="0 0 100 100" className="w-full h-full">
                    {paths}
                </svg>
            );
        };

        // Simple Bar Chart Component
        const BarChart = ({ data }) => {
            const maxCount = Math.max(...data.map(d => d.count));
            return (
                <div className="space-y-3">
                    {data.slice(0, 5).map((item, idx) => (
                        <div key={idx} className="flex items-center gap-3">
                            <div className="text-xs font-bold w-40 truncate" title={item.name}>{item.name}</div>
                            <div className="flex-1 bg-gray-200 rounded-full h-6 relative overflow-hidden">
                                <div
                                    style={{ backgroundColor: item.color, width: `${(item.count / maxCount) * 100}%` }}
                                    className="h-full rounded-full flex items-center justify-end pr-2"
                                >
                                    <span className="text-xs font-bold text-white">{item.count}</span>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        function App() {
            const [cats, setCats] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [search, setSearch] = React.useState("");
            const [sortBy, setSortBy] = React.useState("catNameNickname");
            const [activeTab, setActiveTab] = React.useState("registry");
            const [lastSync, setLastSync] = React.useState("");

            React.useEffect(() => {
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(API_URL + "?v=" + Date.now());
                fetch(proxyUrl)
                    .then((res) => res.json())
                    .then((data) => {
                        setCats(data);
                        setLastSync(
                            new Date().toLocaleString('en-US', {
                                month: 'short',
                                day: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit',
                                hour12: true,
                            })
                        );
                        setLoading(false);
                    })
                    .catch((err) => {
                        console.error('Fetch error:', err);
                        setLoading(false);
                    });
            }, []);

            const filteredCats = cats.filter((cat) => {
                if (!cat.catNameNickname || cat.catNameNickname.toString().trim() === "") return false;
                const catName = (cat.catNameNickname || "").toString().toLowerCase();
                const catStreet = (cat.street || "").toString().toLowerCase();
                const searchTerm = search.toLowerCase();
                return catName.includes(searchTerm) || catStreet.includes(searchTerm);
            });

            if (loading) return (
                <div className="flex flex-col items-center justify-center min-h-screen">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-[#E68A4F]"></div>
                    <p className="mt-4 text-gray-600 font-medium">Fetching the cats from Google Sheets...</p>
                </div>
            );

            // Data Crunching for Charts
            const spayedData = [
                { name: 'Spayed', value: cats.filter(c => c.spayed === 'Yes').length, fill: '#E68A4F' },
                { name: 'Not Spayed', value: cats.filter(c => c.spayed !== 'Yes').length, fill: '#e5e7eb' }
            ];

            const vacData = [
                { name: 'Vaccinated', value: cats.filter(c => c.vaccinatedAntiRabies === 'Yes').length, fill: '#3b82f6' },
                { name: 'Pending', value: cats.filter(c => c.vaccinatedAntiRabies !== 'Yes').length, fill: '#e5e7eb' }
            ];

            const genderCounts = cats.reduce((acc, cat) => {
                const gender = cat.gender || 'Unknown';
                acc[gender] = (acc[gender] || 0) + 1;
                return acc;
            }, {});

            const genderData = [
                { name: 'Male', value: genderCounts['Male'] || 0, fill: '#60a5fa' },
                { name: 'Female', value: genderCounts['Female'] || 0, fill: '#f472b6' },
                { name: 'Unknown', value: genderCounts['Unknown'] || 0, fill: '#cbd5e1' }
            ];

            const streetCounts = cats.reduce((acc, cat) => {
                acc[cat.street] = (acc[cat.street] || 0) + 1;
                return acc;
            }, {});

            const colors = ['#E68A4F', '#60a5fa', '#34d399', '#fbbf24', '#f87171', '#a78bfa'];
            const streetData = Object.keys(streetCounts).map((street, idx) => ({
                name: street,
                count: streetCounts[street],
                color: colors[idx % colors.length]
            })).sort((a, b) => b.count - a.count);

            return (
                <div className="max-w-6xl mx-auto px-4 py-8">
                    <header className="text-center mb-8">
                        <h1 className="text-4xl font-bold text-[#333333] mb-4">🐈 NCE 1 Cat Registry</h1>

                        <div className="inline-flex bg-gray-100 p-1 rounded-full mb-6 shadow-inner">
                            <button
                                onClick={() => setActiveTab('registry')}
                                className={`px-8 py-2 rounded-full text-sm font-bold transition-all ${activeTab === 'registry' ? 'bg-[#E68A4F] text-white shadow-md' : 'text-gray-500'}`}
                            >
                                Registry
                            </button>
                            <button
                                onClick={() => setActiveTab('stats')}
                                className={`px-8 py-2 rounded-full text-sm font-bold transition-all ${activeTab === 'stats' ? 'bg-[#E68A4F] text-white shadow-md' : 'text-gray-500'}`}
                            >
                                Stats & Insights
                            </button>
                        </div>

                        <div className="flex flex-col gap-1 mb-6">
                            <p className="text-[#E68A4F] font-bold text-lg">
                                {activeTab === 'registry' ? `Total Residents: ${cats.length}` : 'Community Health Dashboard'}
                            </p>
                            <p className="text-gray-400 text-[10px] uppercase tracking-widest font-bold">
                                Last Synced: {lastSync}
                            </p>
                        </div>

                        {activeTab === 'registry' && (
                            <div className="w-full max-w-2xl mx-auto px-4">
                                <input
                                    type="text"
                                    placeholder="Search by name or street..."
                                    className="w-full px-6 py-3 rounded-full border-2 border-gray-200 focus:border-[#E68A4F] outline-none shadow-sm mb-4"
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                                <div className="flex justify-center gap-2">
                                    <button
                                        onClick={() => setSortBy('catNameNickname')}
                                        className={`px-4 py-2 rounded-full text-sm font-bold transition-all ${sortBy === 'catNameNickname' ? 'bg-[#E68A4F] text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}
                                    >
                                        Sort by Name
                                    </button>
                                    <button
                                        onClick={() => setSortBy('street')}
                                        className={`px-4 py-2 rounded-full text-sm font-bold transition-all ${sortBy === 'street' ? 'bg-[#E68A4F] text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}
                                    >
                                        Sort by Street
                                    </button>
                                </div>
                            </div>
                        )}
                    </header>

                    {activeTab === 'registry' ? (
                        /* --- REGISTRY VIEW --- */
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 animate-fadeIn">
                            {filteredCats
                                .sort((a, b) => (a[sortBy] || "").toString().localeCompare((b[sortBy] || "").toString()))
                                .map((cat, index) => (
                                    <div key={index} className="bg-white rounded-3xl overflow-hidden shadow-md border-b-4 border-[#E68A4F] flex flex-col">
                                        <div className="h-56 overflow-hidden bg-gray-100 border-b border-gray-100">
                                            <img
                                                src={getImageUrl(cat.photourl)}
                                                alt={cat.catNameNickname}
                                                className="w-full h-full object-cover"
                                                loading="lazy"
                                            />
                                        </div>
                                        <div className="p-6">
                                            <h2 className="text-2xl font-bold text-[#333333]">{cat.catNameNickname || 'Unknown Cat'}</h2>
                                            <p className="text-gray-500 text-sm mb-2">📍 {cat.street || 'Unknown Street'}</p>
                                            <div className="flex flex-wrap gap-2 mb-4">
                                                <span className="px-2 py-1 bg-gray-100 rounded text-[10px] font-bold uppercase tracking-wider">{cat.gender || 'Unknown'}</span>
                                                <span className={`px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider ${cat.spayed === 'Yes' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                    {cat.spayed === 'Yes' ? 'Spayed ✨' : 'Not Spayed'}
                                                </span>
                                            </div>
                                            <div className="border-t pt-4 space-y-2 text-sm">
                                                <p><strong>Color:</strong> {cat.colorDescription || 'N/A'}</p>
                                                <p><strong>Fed Regularly:</strong> {cat.regularlyFed || 'N/A'}</p>
                                                <p><strong>Vaccinated:</strong> {cat.vaccinatedAntiRabies || 'N/A'}</p>
                                                <p className="italic text-gray-600 mt-2">"{cat.notes || 'No additional notes.'}"</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                        </div>
                    ) : (
                        /* --- STATS VIEW --- */
                        <div className="space-y-8 animate-fadeIn">
                            <p className="text-[#333333] font-bold text-lg text-center">
                                Total Residents: {cats.length}
                            </p>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                    <h3 className="font-bold text-gray-700 mb-4 text-center">Spay/Neuter Status</h3>
                                    <div className="h-64 md:h-80 lg:h-96 flex items-center">
                                        <div className="w-full flex flex-col items-center">
                                            <PieChart data={spayedData} />
                                            <div className="text-xs mt-4 text-center">
                                                {spayedData.map((item, i) => (
                                                    <p key={i}><span style={{ color: item.fill }} className="inline-block w-2 h-2 rounded-full mr-1 bg-current"></span>{item.name}: {item.value}</p>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                    <h3 className="font-bold text-gray-700 mb-4 text-center">Vaccination Status</h3>
                                    <div className="h-64 md:h-80 lg:h-96 flex items-center">
                                        <div className="w-full flex flex-col items-center">
                                            <PieChart data={vacData} />
                                            <div className="text-xs mt-4 text-center">
                                                {vacData.map((item, i) => (
                                                    <p key={i}><span style={{ color: item.fill }} className="inline-block w-2 h-2 rounded-full mr-1 bg-current"></span>{item.name}: {item.value}</p>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                    <h3 className="font-bold text-gray-700 mb-4 text-center">Gender Distribution</h3>
                                    <div className="h-64 md:h-80 lg:h-96 flex items-center">
                                        <div className="w-full flex flex-col items-center">
                                            <PieChart data={genderData} />
                                            <div className="text-xs mt-4 text-center">
                                                {genderData.map((item, i) => (
                                                    <p key={i}><span style={{ color: item.fill }} className="inline-block w-2 h-2 rounded-full mr-1 bg-current"></span>{item.name}: {item.value}</p>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                    <h3 className="font-bold text-gray-700 mb-4 text-center">Street Distribution</h3>
                                    <div className="h-64 md:h-80 lg:h-96 flex items-center">
                                        <div className="w-full">
                                            <BarChart data={streetData} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
