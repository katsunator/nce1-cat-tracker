<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <title>NCE 1 Community Cat Tracker</title>
    <style>
        body { background-color: #FDFBF7; font-family: sans-serif; }
        .calico-gradient { background: linear-gradient(135deg, #E68A4F 0%, #333333 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const API_URL = 'https://script.google.com/macros/s/AKfycbw1q-xlR7Tt3I_v4NReh5prHyO1j_k2Qhw1jK3kkXGpPX7M2tfRuqxK0nzSw5q7UKXu/exec';
        function App() {
            const [cats, setCats] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [search, setSearch] = React.useState("");

    React.useEffect(() => {
            // This line combines the proxy and your URL correctly
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);
    
    fetch(proxyUrl)
        .then(res => {
            if (!res.ok) throw new Error('Network response was not ok');
            return res.json();
        })
        .then(data => {
            console.log("Success!", data);
            setCats(data);
            setLoading(false);
        })
        .catch(err => {
            console.error("The error is:", err);
            setLoading(false);
        });
}, []);

            const filteredCats = cats.filter(cat => {
    // We use (cat.name || "") to say "use the name, OR use an empty string if it's missing"
    const catName = (cat.name || "").toString().toLowerCase();
    const catLocation = (cat.location || "").toString().toLowerCase();
    const searchTerm = search.toLowerCase();

    return catName.includes(searchTerm) || catLocation.includes(searchTerm);
});

            if (loading) return (
               <div key={index} className="bg-white rounded-3xl overflow-hidden shadow-md border-b-4 border-[#E68A4F]">
    <div className="p-6">
        {/* Name and Street */}
        <h2 className="text-2xl font-bold text-[#333333]">{cat.catNameNickname || "Unknown Cat"}</h2>
        <p className="text-gray-500 text-sm mb-2">📍 {cat.street || "Unknown Street"}</p>
        
        {/* Badges for Status */}
        <div className="flex flex-wrap gap-2 mb-4">
            <span className="px-2 py-1 bg-gray-100 rounded text-[10px] font-bold uppercase tracking-wider">
                {cat.gender || "Unknown"}
            </span>
            <span className={`px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider ${cat.spayed === "Yes" ? "bg-green-100 text-green-700" : "bg-red-100 text-red-700"}`}>
                {cat.spayed === "Yes" ? "Spayed ✨" : "Not Spayed"}
            </span>
        </div>

        {/* Detailed Information */}
        <div className="border-t pt-4 space-y-2">
            <p className="text-sm"><strong>Color:</strong> {cat.colorDescription || "N/A"}</p>
            <p className="text-sm"><strong>Fed Regularly:</strong> {cat.regularlyFed || "N/A"}</p>
            <p className="text-sm"><strong>Vaccinated:</strong> {cat.vaccinatedAntiRabies || "N/A"}</p>
            <p className="text-sm italic text-gray-600 mt-2">"{cat.notes || "No additional notes."}"</p>
        </div>
    </div>
</div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
